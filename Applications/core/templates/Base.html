<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS and JS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>Document</title>
</head>
<body>
    <div class="row">
        <div class="col-md-2 p-4">
            <h1 class="text-2xl font-bold">FoodBridge</h1>
            <nav class="nav flex-column mt-4">
                <ul class="list-unstyled">
                    <li class="mb-2 rounded bg-primary text-white p-2">
                        <i class="bi bi-speedometer"></i>
                        <a href="#" class="text-decoration-none">Dashboard</a>
                    </li>
                    <li class="mb-2 rounded p-2">
                        <i class="bi bi-file-earmark-text"></i>
                        <a href="#" class="text-decoration-none text-dark">Food Post</a>
                    </li>
                    <li class="mb-2 rounded p-2">
                        <i class="bi bi-calendar-event"></i>
                        <a href="#" class="text-decoration-none text-dark">Activities</a>
                    </li>
                    <li class="mb-2 rounded p-2">
                        <i class="bi bi-gear"></i>
                        <a href="#" class="text-decoration-none text-dark">Settings</a>
                    </li>
                </ul>
            </nav>
        </div>
        <div class="col-md-10">
            <div class="row">
                <div class="col-md-3">
                    <h1>
                        {% block title %}{% endblock %}
                    </h1>
                    <span class="text-sm text-gray-500">
                        {% block description %}{% endblock %}
                    </span>
                </div>
                <div class="col-md-9 text-end">
                    <input type="text" placeholder="Search..." class="form-control d-inline-block w-auto">
                    <button class="btn btn-primary">Search</button>
                </div>
            </div>
            <div class="row mt-4">
                <div class="col-12">            
                    {% block content %}
                    {% endblock %}                    
                </div>
            </div>
        </div>
    </div>

</body>
</html>
